name: CI/CD Pipeline - Seguretat RBAC (PostgreSQL)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-security:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: incidenttracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout codi
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instal·lar Chrome i Chromedriver
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable unzip
        # Chromedriver
        wget -N https://storage.googleapis.com/chrome-for-testing-public/$(google-chrome --version | awk '{print $3}')/linux64/chromedriver-linux64.zip
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver
        # Verificar
        google-chrome --version
        chromedriver --version

    - name: Instal·lar dependències Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psycopg2-binary selenium

    - name: Configurar variables d'entorn
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
      run: |
        echo "SECRET_KEY=$SECRET_KEY" >> $GITHUB_ENV
        echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
        echo "DEBUG=False" >> $GITHUB_ENV

    - name: Esperar que PostgreSQL estigui llest
      run: |
        for i in {1..10}; do
          if pg_isready -h localhost -p 5432 -U postgres; then
            echo "✅ PostgreSQL està llest!"
            break
          fi
          echo "Esperant PostgreSQL... intent $i"
          sleep 2
        done

    - name: Preparar base de dades
      run: |
        # Verificar connexió
        python -c "
import psycopg2
try:
    conn = psycopg2.connect(
        host='localhost',
        port=5432,
        user='postgres',
        password='postgres',
        database='incidenttracker'
    )
    print('✅ Connexió a PostgreSQL OK')
    conn.close()
except Exception as e:
    print(f'❌ Error de connexió: {e}')
    exit(1)
"
        # Migrar
        python manage.py migrate
        
        # Crear usuari
        python manage.py shell -c "
from django.contrib.auth.models import User
user, created = User.objects.get_or_create(
    username='analista1',
    defaults={
        'email': 'analista1@example.com',
        'is_staff': True
    }
)
if created:
    user.set_password('password123')
    user.save()
    print('✅ Usuari analista1 CREAT')
else:
    user.is_staff = True
    user.save()
    print('✅ Usuari analista1 ACTUALITZAT')
from django.db import connection
print(f'✅ Base de dades: {connection.vendor}')
"

    - name: Executar tests de seguretat
      run: |
        echo "=== Executant tests de seguretat ==="
        python manage.py test core.tests_selenium.SecurityRegressionTests.test_role_restriction --noinput

    - name: Notificació de resultats
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Tests de seguretat passats correctament!"
          echo "✅ PIPELINE COMPLETADA AMB ÈXIT"
        else
          echo "❌ Tests de seguretat fallats! Reviseu els permisos RBAC."
          echo "📝 Aquest error és NORMAL si és la Fase RED (esperat)"
          exit 0  # No falla la pipeline per la Fase RED
        fi
