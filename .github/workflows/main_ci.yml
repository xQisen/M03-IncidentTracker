name: CI/CD Pipeline - Seguretat RBAC (PostgreSQL)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-security:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: incidenttracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout codi
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instal·lar Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Instal·lar dependències
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary selenium webdriver-manager
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Configurar variables d'entorn
      run: |
        echo "SECRET_KEY=${{ secrets.SECRET_KEY || 'django-insecure-test-key' }}" >> $GITHUB_ENV
        echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
        echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/incidenttracker" >> $GITHUB_ENV

    - name: Esperar que PostgreSQL estigui llest
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Esperant PostgreSQL..."
          sleep 2
        done

    - name: Preparar base de dades
      run: |
        python manage.py migrate
        # Usamos un bloque indentado para evitar el error de la línea 65
        python manage.py shell <<EOF
        from django.contrib.auth.models import User
        if not User.objects.filter(username='analista1').exists():
            User.objects.create_user('analista1', 'analista1@example.com', 'password123', is_staff=True)
            print('✅ Usuari analista1 CREAT')
        else:
            print('✅ Usuari analista1 ja existeix')
        EOF

    - name: Executar tests de seguretat
      run: |
        echo "=== Executant tests de seguretat ==="
        python manage.py test core.tests_selenium.SecurityRegressionTests.test_role_restriction --noinput

    - name: Notificació de resultats
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Tests passats correctament!"
        else
          echo "❌ Error detectat en la pipeline."
        fi
