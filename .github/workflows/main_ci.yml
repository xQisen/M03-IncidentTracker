name: CI/CD Pipeline - Seguretat RBAC (Chrome)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-security:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: isard
          POSTGRES_PASSWORD: isard
          POSTGRES_DB: incidenttracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout codi
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instal·lar Chrome i Chromedriver
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        # Instal·lar Chromedriver
        wget -N https://chromedriver.storage.googleapis.com/LATEST_RELEASE
        wget https://chromedriver.storage.googleapis.com/$(cat LATEST_RELEASE)/chromedriver_linux64.zip
        unzip chromedriver_linux64.zip
        sudo mv chromedriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver
        # Verificar instal·lació
        google-chrome --version
        chromedriver --version

    - name: Instal·lar dependències Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install selenium webdriver-manager

    - name: Configurar variables d'entorn
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
      run: |
        echo "SECRET_KEY=$SECRET_KEY" >> $GITHUB_ENV
        echo "DATABASE_URL=postgresql://isard:isard@localhost:5432/incidenttracker" >> $GITHUB_ENV
        echo "DEBUG=False" >> $GITHUB_ENV

    - name: Preparar base de dades
      run: |
        python manage.py migrate
        # Crear usuari analista1 (TOT EN UNA SOLA LÍNIA per evitar errors YAML)
        python manage.py shell -c "from django.contrib.auth.models import User; user, created = User.objects.get_or_create(username='analista1', defaults={'email': 'analista1@example.com', 'is_staff': True}); print('Creat' if created else 'Ja existeix')"

    - name: Executar tests de seguretat
      run: |
        echo "=== Executant tests de seguretat ==="
        python manage.py test core.tests_selenium.SecurityRegressionTests.test_role_restriction --noinput

    - name: Notificació de resultats
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Tests de seguretat passats correctament!"
        else
          echo "❌ Tests de seguretat fallats! Reviseu els permisos RBAC."
          exit 1
        fi
