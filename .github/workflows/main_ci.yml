name: CI/CD Pipeline - Seguretat RBAC (PostgreSQL)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-security:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: incidenttracker
        ports:
          - 5432:5432
        # Importante: añadir health check para que el job espere al contenedor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout codi
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instal·lar Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Configurar Chromedriver (Auto-detect version)
      run: |
        # Usamos una versión específica de 'chrome-for-testing' para evitar desajustes
        CHROME_VERSION=$(google-chrome --version | cut -f 3 -d ' ' | cut -d '.' -f 1)
        echo "Chrome Version: $CHROME_VERSION"
        # Instalamos chromedriver usando el nuevo método de Google para versiones >114
        pip install webdriver-manager

    - name: Instal·lar dependències Python
      run: |
        python -m pip install --upgrade pip
        # Asegúrate de que tu requirements.txt no cause conflictos con psycopg2
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install psycopg2-binary selenium webdriver-manager

    - name: Configurar variables d'entorn
      run: |
        echo "SECRET_KEY=${{ secrets.SECRET_KEY || 'django-insecure-test-key' }}" >> $GITHUB_ENV
        echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
        echo "DEBUG=False" >> $GITHUB_ENV
        echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/incidenttracker" >> $GITHUB_ENV

    - name: Esperar que PostgreSQL estigui llest
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Esperant PostgreSQL..."
          sleep 2
        done

    - name: Preparar base de dades
      env:
        # Forzamos las credenciales aquí para los comandos de Django
        DB_PASSWORD: postgres
      run: |
        python manage.py migrate
        
        # Crear usuario mediante un script de gestión para asegurar que existe
        python manage.py shell -c "
from django.contrib.auth.models import User
try:
    user = User.objects.get(username='analista1')
    user.set_password('password123')
    user.is_staff = True
    user.save()
    print('✅ Usuari analista1 ACTUALITZAT')
except User.DoesNotExist:
    User.objects.create_superuser('analista1', 'analista1@example.com', 'password123')
    print('✅ Usuari analista1 CREAT com Superuser per a tests')
"

    - name: Executar tests de seguretat
      run: |
        echo "=== Executant tests de seguretat ==="
        # Nota: Asegúrate de que el test use el modo 'headless' en Selenium para CI
        python manage.py test core.tests_selenium.SecurityRegressionTests.test_role_restriction --noinput

    - name: Notificació de resultats
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Tests de seguretat passats correctament!"
        else
          echo "⚠️ La pipeline ha fallat o s'han detectat problemes."
          # Si estás en fase RED de TDD, no quieres que el CI bloquee todo
          # exit 0 
        fi
