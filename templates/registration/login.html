<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sessió - IncidentTracker</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px;">
        <h1 style="text-align: center; color: #333;">IncidentTracker</h1>
        <h2 style="text-align: center; color: #666;">Iniciar Sessió</h2>
        
        {% if form.errors %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 20px;">
            Usuari o contrasenya incorrectes. Si us plau, torna-ho a intentar.
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div style="margin-bottom: 15px;">
                <label for="id_username" style="display: block; margin-bottom: 5px; color: #555;">Usuari:</label>
                <input type="text" name="username" id="id_username" required 
                       style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="id_password" style="display: block; margin-bottom: 5px; color: #555;">Contrasenya:</label>
                <input type="password" name="password" id="id_password" required 
                       style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            </div>
            <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Iniciar Sessió
            </button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</body>
</html>
